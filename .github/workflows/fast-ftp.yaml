name: FTP Debug Transfer

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (space separated)"
        required: true
        type: string

      ftp_host:
        description: "FTP Host (example: 2193182633.cloudydl.com)"
        required: true
        type: string

      ftp_user:
        description: "FTP Username"
        required: true
        type: string

      ftp_pass:
        description: "FTP Password"
        required: true
        type: string

      ftp_path:
        description: "FTP Path"
        required: false
        default: "/"
        type: string

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl lftp iputils-ping

      - name: Show inputs
        run: |
          echo "FTP HOST: ${{ github.event.inputs.ftp_host }}"
          echo "FTP PATH: ${{ github.event.inputs.ftp_path }}"

      - name: Test DNS
        run: |
          host "${{ github.event.inputs.ftp_host }}" || true

      - name: Test ping
        run: |
          ping -c 3 "${{ github.event.inputs.ftp_host }}" || true

      - name: Prepare folder
        run: mkdir -p files

      - name: Download files
        run: |
          URLS="${{ github.event.inputs.urls }}"

          for URL in $URLS; do
            echo "Downloading: $URL"

            aria2c \
              -x 16 \
              -s 16 \
              -k 1M \
              --file-allocation=none \
              --content-disposition=true \
              --dir=files \
              "$URL"

          done

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -lh files

      - name: FTP Debug Upload
        run: |
          HOST="${{ github.event.inputs.ftp_host }}"
          USER="${{ github.event.inputs.ftp_user }}"
          PASS="${{ github.event.inputs.ftp_pass }}"
          PATH="${{ github.event.inputs.ftp_path }}"

          echo "Starting FTP upload..."

          lftp -d -u "$USER","$PASS" "ftp://$HOST" <<EOF
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          set xfer:clobber on
          ls
          mirror -R files $PATH --parallel=2
          quit
EOF

      - name: Done
        run: echo "Workflow finished"
