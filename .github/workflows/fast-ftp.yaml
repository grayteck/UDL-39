name: Stream Link to FTP (Debug)

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct file URL"
        required: true
        type: string

      filename:
        description: "Filename on FTP"
        required: true
        type: string

      ftp_host:
        description: "FTP Host (example: 2193182633.cloudydl.com)"
        required: true
        type: string

      ftp_user:
        description: "FTP Username"
        required: true
        type: string

      ftp_pass:
        description: "FTP Password"
        required: true
        type: string

      ftp_path:
        description: "FTP Path"
        required: false
        default: "/"
        type: string

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl lftp dnsutils iputils-ping

      - name: Show inputs
        run: |
          echo "URL: ${{ github.event.inputs.url }}"
          echo "FTP HOST: ${{ github.event.inputs.ftp_host }}"
          echo "FTP PATH: ${{ github.event.inputs.ftp_path }}"

      - name: Test DNS
        run: |
          echo "DNS lookup:"
          host "${{ github.event.inputs.ftp_host }}" || true

      - name: Test Ping
        run: |
          echo "Ping test:"
          ping -c 3 "${{ github.event.inputs.ftp_host }}" || true

      - name: Test FTP login (debug)
        run: |
          HOST="${{ github.event.inputs.ftp_host }}"
          USER="${{ github.event.inputs.ftp_user }}"
          PASS="${{ github.event.inputs.ftp_pass }}"

          echo "Testing FTP login..."

          lftp -d -u "$USER","$PASS" "ftp://$HOST" -e "
          set ftp:passive-mode true
          ls
          quit
          "

      - name: Stream file to FTP
        run: |
          URL="${{ github.event.inputs.url }}"
          FILE="${{ github.event.inputs.filename }}"
          HOST="${{ github.event.inputs.ftp_host }}"
          USER="${{ github.event.inputs.ftp_user }}"
          PASS="${{ github.event.inputs.ftp_pass }}"
          PATH="${{ github.event.inputs.ftp_path }}"

          echo "Starting stream upload..."

          curl -L "$URL" | lftp -d -u "$USER","$PASS" "ftp://$HOST" -e "
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 20
          cd $PATH
          put -o $FILE -
          quit
          "

      - name: Done
        run: echo "Transfer finished"
