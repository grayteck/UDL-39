name: Fast Downloader v2

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "🔗 لینک های دانلود (با فاصله جدا کنید)"
        required: true
        type: string
      mode:
        description: "📦 حالت دانلود"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - zip
      password:
        description: "🔒 رمز عبور برای فایل زیپ (اختیاری)"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours timeout

    permissions:
      contents: write # Needed to push commits back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use the default GitHub token
          fetch-depth: 0 # Fetch all history to handle large pushes better

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc git-lfs # Install git-lfs for potentially better large file handling on push

      - name: Prepare directories
        run: |
          mkdir -p downloads
          mkdir -p tmp_downloads # Temporary directory for downloaded files
          echo "Directories prepared: downloads, tmp_downloads"

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️ AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        id: download_files # Give this step an ID to reference its outputs if needed
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_THRESHOLD_MB=95
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "Starting download process..."
          echo "Mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          # Temporary directory for all processed files before commit
          # This avoids needing a separate backup directory and simplifies the process
          WORKING_DIR="." # Use the root of the checkout directory

          # Function to download with retries (aria2 + curl fallback)
          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local DEST_DIR="$3" # Directory to save the file (tmp_downloads or downloads)
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""

            # Clean up previous attempts for this specific file
            rm -f "$DEST_DIR/$FILENAME" "$DEST_DIR/$FILENAME.aria2" "$DEST_DIR/$FILENAME.part.*"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"

              # Try aria2c first
              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="$DEST_DIR" \
                --out="$FILENAME" \
                "$URL" 2>&1)

              if [ -f "$DEST_DIR/$FILENAME" ] && [ -s "$DEST_DIR/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "$DEST_DIR/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "aria2c download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi
              rm -f "$DEST_DIR/$FILENAME" "$DEST_DIR/$FILENAME.aria2" # Clean up failed aria2 download

              # Fallback to curl
              echo "aria2c failed or file empty, trying curl fallback..."
              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "$DEST_DIR/$FILENAME" \
                "$URL" 2>&1)

              if [ -f "$DEST_DIR/$FILENAME" ] && [ -s "$DEST_DIR/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "$DEST_DIR/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "curl download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi
              rm -f "$DEST_DIR/$FILENAME" # Clean up failed curl download
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2)) # Exponential backoff
            done

            if [ "$SUCCESS" = false ]; then
              echo "ERROR: Failed to download $FILENAME after $MAX_RETRIES attempts. Last error: $ERROR_LOG"
              return 1 # Failure
            fi
            return 0 # Success
          }

          # Function to sanitize filenames
          sanitize_filename() {
            echo "$1" | sed 's/[<>:"|?*]//g' | sed 's/ /\ /g' # Basic sanitization, escape spaces
          }

          # Process each URL
          IFS=' ' read -ra URL_LIST <<< "$URLS"
          for URL in "${URL_LIST[@]}"; do
            if [ -z "$URL" ]; then
              echo "Skipping empty URL."
              continue
            fi

            # Extract filename
            FILENAME=$(curl -sI "$URL" | grep -i 'Content-Disposition:' | sed -n 's/.*filename=*\([^"]*\).*/\1/p' | tr -d ';\r\n' | sanitize_filename)
            if [ -z "$FILENAME" ]; then
              FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//' | sanitize_filename)
            fi
            if [ -z "$FILENAME" ]; then
              FILENAME="download_$(date +%Y%m%d_%H%M%S)_$(shuf -i 1000-9999 -n 1)"
              echo "Warning: Could not determine filename. Using generic name: $FILENAME"
            fi

            echo "Downloading: $URL -> $FILENAME"
            if ! download_with_retry "$URL" "$FILENAME" "tmp_downloads"; then
              echo "ERROR: Download failed for '$FILENAME'. Skipping to next URL."
              continue
            fi
          done

          # --- Post-Download Processing ---
          echo "Processing downloaded files..."

          # Handle files based on mode
          if [ "$MODE" = "zip" ]; then
            echo "Mode: ZIP. Archiving files..."
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              ARCHIVE_PATH="$WORKING_DIR/$ARCHIVE_NAME.zip" # Create archive directly in root

              # Collect valid files from tmp_downloads
              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                else
                  echo "Skipping empty or invalid file in tmp_downloads: $f"
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                echo "Creating zip archive '$ARCHIVE_NAME.zip' with ${#VALID_FILES[@]} files..."
                if [ -n "$ZIP_PASSWORD" ]; then
                  # Split zip automatically if it exceeds default max size, or specify size directly
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                fi

                if [ ! -f "$ARCHIVE_PATH" ] && [ -z "$(ls "$WORKING_DIR/"*.z[0-9]* 2>/dev/null)" ]; then
                  echo "ERROR: Zip archive creation failed for $ARCHIVE_NAME.zip!"
                  rm -f "$ARCHIVE_NAME".* # Clean up partial files
                else
                  echo "Zip archive created successfully."
                  # Ensure all parts are in the working directory
                  mv "$ARCHIVE_NAME".* "$WORKING_DIR/" 2>/dev/null || true
                fi
              else
                echo "No valid files found in tmp_downloads to archive."
              fi
            fi
            rm -rf tmp_downloads # Clean up temporary download dir
          else # Normal mode
            echo "Mode: NORMAL. Moving and splitting files..."
            # Move all successfully downloaded files to the 'downloads' directory
            mv tmp_downloads/* downloads/ 2>/dev/null || true
            rm -rf tmp_downloads # Clean up temporary download dir

            # Split files larger than threshold directly in the 'downloads' directory
            echo "Splitting large files in 'downloads' directory..."
            cd downloads || exit 1
            find . -maxdepth 1 -type f -print0 | while IFS= read -r -d $'\0' file; do
              FILE_PATH="./$file"
              FILE_SIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo "0")

              if [ "$FILE_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "File '$file' is too large (${FILE_SIZE} bytes), splitting into parts of ${SPLIT_THRESHOLD_MB}MB..."
                BASENAME=$(basename "$file")
                PART_PREFIX="${file%.*}.part." # Prefix for split files
                if [ -f "$file" ]; then
                  split -b "$SPLIT_THRESHOLD_BYTES" "$file" "$PART_PREFIX"
                  rm "$file" # Remove original large file
                  echo "Split '$file' into parts with prefix '$PART_PREFIX'."
                fi
              fi
            done
            cd - > /dev/null # Go back to previous directory
          fi

          echo "File processing complete."

      - name: Commit and Push changes
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "Starting Commit and Push process to branch: $BRANCH"

          # Regenerate README.md in the downloads folder
          DOWNLOADS_README="downloads/README.md"
          echo "# Downloaded Files List :" > "$DOWNLOADS_README"
          echo "" >> "$DOWNLOADS_README"
          find downloads -maxdepth 1 -type f -printf '%f\n' 2>/dev/null | sort | while read -r FILENAME; do
            if [ -n "$FILENAME" ]; then
              # Basic URL encoding for filenames with special characters
              ENCODED_FILENAME=$(printf %s "$FILENAME" | sed 's/ /%20/g')
              printf -- "- [%s](%s)\n" "$FILENAME" "$ENCODED_FILENAME" >> "$DOWNLOADS_README"
            fi
          done
          echo "" >> "$DOWNLOADS_README"
          echo "---" >> "$DOWNLOADS_README"
          echo "*Powered by AVASAM (https://avasam.ir)*" >> "$DOWNLOADS_README"
          echo "Downloads README regenerated."

          # Add all files and commit
          git add . # Add all files in the current directory (including downloads and README)
          if ! git diff --cached --quiet; then
            git commit -m "[AVASAM] Update downloaded files [skip ci]" --quiet
            echo "Changes committed."

            # Push changes with retry mechanism
            MAX_PUSH_RETRIES=5
            PUSH_TIMEOUT=300 # 5 minutes timeout for each push attempt
            PUSH_ATTEMPT=0
            PUSH_SUCCESS=false
            while [ $PUSH_ATTEMPT -lt $MAX_PUSH_RETRIES ]; do
              PUSH_ATTEMPT=$((PUSH_ATTEMPT + 1))
              echo "Push attempt $PUSH_ATTEMPT/$MAX_PUSH_RETRIES to origin/$BRANCH..."
              if timeout $PUSH_TIMEOUT git push origin HEAD:"$BRANCH"; then
                echo "Push successful!"
                PUSH_SUCCESS=true
                break
              else
                echo "Push failed. Retrying in 10 seconds..."
                sleep 10
              fi
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "ERROR: Final push failed after $MAX_PUSH_RETRIES attempts. Please check the repository manually."
              exit 1 # Exit with error if final push fails
            fi
          else
            echo "No changes to commit."
          fi

          echo ""
          echo "=========================================="
          echo "Commit and Push process finished successfully."
          echo "AVASAM (https://avasam.ir)"
          echo "=========================================="
