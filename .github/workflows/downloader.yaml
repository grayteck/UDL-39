name: Fast Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "🔗 لینک های دانلود (با فاصله جدا کنید)"
        required: true
        type: string
      mode:
        description: "📦 حالت دانلود"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - zip
      password:
        description: "🔒 رمز عبور برای فایل زیپ (اختیاری)"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours timeout

    permissions:
      contents: write # Needed to push commits back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use the default GitHub token
          fetch-depth: 0 # Fetch all history to handle large pushes better

      - name: Configure Git for Large Files
        run: |
          # Configure Git for handling potentially large files and avoiding timeouts during push
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc # bc for calculations, zip for archiving

      - name: Prepare directories
        run: |
          mkdir -p downloads
          mkdir -p tmp_downloads # Temporary directory for downloaded files

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️ AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_THRESHOLD_MB=95 # Split files larger than 95MB to avoid GitHub's 100MB file limit
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}" # Current branch name

          BACKUP_DIR="/tmp/download_backup_$$" # A temporary directory for staging files before push
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt # Save backup dir path for later steps

          echo "AVASAM Downloader - Downloading files..."
          echo "Mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          echo "Backup directory: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_LOG=""
            local CURRENT_DIR="tmp_downloads" # Directory for temporary downloads

            rm -f "$CURRENT_DIR/$FILENAME" "$CURRENT_DIR/$FILENAME.aria2" # Clean up from previous attempts

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"

              # Try aria2c first for faster downloads
              ERROR_LOG=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="$CURRENT_DIR" \
                --out="$FILENAME" \
                "$URL" 2>&1)

              if [ -f "$CURRENT_DIR/$FILENAME" ] && [ -s "$CURRENT_DIR/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "$CURRENT_DIR/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "aria2c download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi
              rm -f "$CURRENT_DIR/$FILENAME" "$CURRENT_DIR/$FILENAME.aria2" # Clean up failed aria2 download

              # Fallback to curl if aria2c fails or file is empty
              echo "aria2c failed or file empty, trying curl fallback..."
              ERROR_LOG=$(curl -L -f -# \
                --retry 3 \
                --retry-delay 5 \
                --connect-timeout 30 \
                --max-time 3600 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "$CURRENT_DIR/$FILENAME" \
                "$URL" 2>&1)

              if [ -f "$CURRENT_DIR/$FILENAME" ] && [ -s "$CURRENT_DIR/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "$CURRENT_DIR/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "curl download successful: $FILENAME (${FILE_SIZE} bytes)"
                  break
                fi
              fi
              rm -f "$CURRENT_DIR/$FILENAME" # Clean up failed curl download
              echo "Attempt $attempt failed. Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2)) # Exponential backoff for delay
            done

            if [ "$SUCCESS" = true ] && [ -f "$CURRENT_DIR/$FILENAME" ] && [ -s "$CURRENT_DIR/$FILENAME" ]; then
              local FINAL_SIZE=$(stat -c%s "$CURRENT_DIR/$FILENAME" 2>/dev/null || echo "0")
              if [ "$FINAL_SIZE" -gt 0 ]; then
                echo "Successfully downloaded: $FILENAME ($FINAL_SIZE bytes)"
                return 0 # Success
              fi
            fi

            echo "ERROR: Failed to download $FILENAME after $MAX_RETRIES attempts. Last error: $ERROR_LOG"
            return 1 # Failure
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Process each URL provided
          IFS=' ' read -ra URL_LIST <<< "$URLS"
          for URL in "${URL_LIST[@]}"; do
            if [ -z "$URL" ]; then
              echo "Skipping empty URL."
              continue
            fi

            # Extract filename, try Content-Disposition first, then URL basename
            FILENAME=$(curl -sI "$URL" | grep -i 'Content-Disposition:' | sed -n 's/.*filename=*\([^"]*\).*/\1/p' | tr -d ';\r\n')
            if [ -z "$FILENAME" ]; then
              FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            fi
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g') # Sanitize filename
            
            if [ -z "$FILENAME" ]; then
              FILENAME="download_$(date +%Y%m%d_%H%M%S)_$(shuf -i 1000-9999 -n 1)"
              echo "Warning: Could not determine filename from URL '$URL'. Using generic name: $FILENAME"
            fi

            echo "Downloading: $URL -> $FILENAME"
            if ! download_with_retry "$URL" "$FILENAME"; then
              echo "ERROR: Download failed for '$FILENAME'. Check logs above. Skipping to next URL."
              continue # Skip to next URL if download failed
            fi
          done

          # Process downloaded files based on mode (normal or zip)
          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              ARCHIVE_PATH="$BACKUP_DIR/$ARCHIVE_NAME.zip"
              echo "Creating zip archive: $ARCHIVE_NAME.zip"

              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                else
                  echo "Skipping empty or invalid file: $f"
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                echo "Zipping ${#VALID_FILES[@]} files into $ARCHIVE_PATH..."
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_PATH}" "${VALID_FILES[@]}"
                fi

                if [ ! -s "${ARCHIVE_PATH}" ] && [ -z "$(ls "$BACKUP_DIR/"*.z[0-9]* 2>/dev/null)" ]; then
                  echo "ERROR: Zip archive creation failed for $ARCHIVE_NAME.zip!"
                  rm -f "$BACKUP_DIR/$ARCHIVE_NAME".*
                else
                  echo "Zip archive created successfully."
                  mv "$BACKUP_DIR/$ARCHIVE_NAME".* "$BACKUP_DIR/" # Move archive parts to backup dir root
                fi
              else
                echo "No valid files found to archive."
              fi
            fi
            rm -rf tmp_downloads
          else # Normal mode: move files to downloads directory
            mv tmp_downloads/* downloads/ 2>/dev/null || true
            rm -rf tmp_downloads
          fi

          # --- File Splitting Logic ---
          # This part is now handled within the zip/normal mode for clarity
          # If mode is normal, files are moved to downloads/ and then split if needed.
          # If mode is zip, files are archived directly into zip parts.

          echo "Processing files in 'downloads' directory for splitting if needed..."
          cd downloads || exit 1 # Change directory to downloads to process files

          find . -maxdepth 1 -type f -print0 | while IFS= read -r -d $'\0' file; do
            FILE_PATH="./$file"
            FILE_SIZE=$(stat -c%s "$FILE_PATH" 2>/dev/null || echo "0")

            if [ "$FILE_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "File '$file' is too large (${FILE_SIZE} bytes), splitting into parts of ${SPLIT_THRESHOLD_MB}MB..."
              BASENAME=$(basename "$file")
              PART_PREFIX="${file%.*}.part." # Use base name to avoid issues with extensions
              if [ -f "$file" ]; then
                 split -b "$SPLIT_THRESHOLD_BYTES" "$file" "$PART_PREFIX"
                 rm "$file" # Remove original large file
                 echo "Split '$file' into parts with prefix '$PART_PREFIX'."
              fi
            fi
          done
          cd - > /dev/null # Go back to previous directory

          echo "File processing complete."
          echo "Contents of backup directory:"
          find "$BACKUP_DIR" -type f -ls
          echo "----------------------------"

      - name: Commit and Push files
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          MAX_PUSH_RETRIES=5
          PUSH_TIMEOUT=300 # 5 minutes timeout for each push attempt

          echo "AVASAM - Starting Commit and Push process."
          echo "Branch: $BRANCH"
          echo "Backup directory: $BACKUP_DIR"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Helper function to regenerate README.md in downloads folder
          regenerate_downloads_readme() {
            DOWNLOADS_README="downloads/README.md"
            echo "Regenerating downloads README..."
            {
              echo "# Downloaded list :"
              echo ""
            } > "$DOWNLOADS_README"

            # List directories in downloads/ and create links in README.md
            find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "$FOLDER")
                printf -- "- [%s](./%s)\n" "$FOLDER" "$FOLDER_ENCODED" >> "$DOWNLOADS_README"
              fi
            done
            # List zip files directly in downloads/ (if mode was zip and file wasn't split)
            find downloads -maxdepth 1 -type f -name "*.zip" -printf '%f\n' 2>/dev/null | sort | while read -r ZIP_FILE; do
               if [ -n "$ZIP_FILE" ]; then
                 ZIP_ENCODED=$(urlencode "$ZIP_FILE")
                 printf -- "- [%s](./%s)\n" "$ZIP_FILE" "$ZIP_ENCODED" >> "$DOWNLOADS_README"
               fi
            done


            {
              echo ""
              echo "---"
              echo ""
              echo "*This tool created by [avasam.ir](https://avasam.ir)*"
            } >> "$DOWNLOADS_README"
            echo "Downloads README regenerated"
          }

          # Helper function to push files in batches
          push_batch() {
            local BATCH_SIZE=3 # Number of files per push batch
            local FILES_TO_PUSH=("$@")
            local TOTAL_FILES=${#FILES_TO_PUSH[@]}
            local PUSHED_COUNT=0
            local CURRENT_BATCH=()

            echo "Starting push process for $TOTAL_FILES files."

            for FILE_TO_PUSH in "${FILES_TO_PUSH[@]}"; do
              CURRENT_BATCH+=("$FILE_TO_PUSH")

              if [ ${#CURRENT_BATCH[@]} -ge $BATCH_SIZE ] || [ $PUSHED_COUNT -eq $(($TOTAL_FILES - 1)) ]; then
                # If batch is full or it's the last file
                echo "---"
                echo "Pushing batch ($((PUSHED_COUNT + 1))/${TOTAL_FILES} files)..."
                echo "Files in batch: ${CURRENT_BATCH[@]}"

                # Reset local repo to match origin before adding new files
                git fetch origin "$BRANCH" --quiet 2>/dev/null || echo "Fetch failed, continuing..."
                git reset --hard origin/"$BRANCH" 2>/dev/null || echo "Reset failed, continuing..."

                # Copy current batch of files to the working directory
                for BATCH_FILE in "${CURRENT_BATCH[@]}"; do
                  if [ -f "$BATCH_FILE" ] || [ -d "$BATCH_FILE" ]; then
                    # Ensure the target directory structure exists
                    TARGET_DIR=$(dirname "$BATCH_FILE")
                    mkdir -p "$TARGET_DIR"
                    cp -r "$BATCH_FILE" . 2>/dev/null || echo "Failed to copy $BATCH_FILE"
                  fi
                done

                # Add and commit the batch
                git add . -f # Add all changes in the current directory
                if ! git diff --cached --quiet; then
                  git commit -m "[AVASAM] Add batch ($((PUSHED_COUNT + 1))/$TOTAL_FILES files) [skip ci]" --quiet 2>/dev/null || echo "Commit failed."
                  echo "Committed batch."

                  # Attempt to push with retries
                  local PUSH_ATTEMPT=0
                  local PUSH_SUCCESS=false
                  while [ $PUSH_ATTEMPT -lt $MAX_PUSH_RETRIES ]; do
                    PUSH_ATTEMPT=$((PUSH_ATTEMPT + 1))
                    echo "Push attempt $PUSH_ATTEMPT/$MAX_PUSH_RETRIES..."
                    if timeout $PUSH_TIMEOUT git push origin HEAD:"$BRANCH" 2>&1; then
                      echo "Push successful!"
                      PUSH_SUCCESS=true
                      break
                    else
                      echo "Push failed. Retrying in 5 seconds..."
                      sleep 5
                    fi
                  done

                  if [ "$PUSH_SUCCESS" = false ]; then
                    echo "ERROR: Batch push failed after $MAX_PUSH_RETRIES attempts. This might cause issues."
                  fi
                else
                  echo "No changes to commit for this batch."
                fi

                CURRENT_BATCH=() # Clear the batch
              fi
              PUSHED_COUNT=$((PUSHED_COUNT + 1))
            done
            echo "------------------"
          }

          # --- Main Push Logic ---
          echo ""
          echo "Preparing files for push..."

          # Fetch latest changes and reset to avoid conflicts
          git fetch origin "$BRANCH" || echo "Failed to fetch, continuing..."
          git reset --hard origin/"$BRANCH" || echo "Failed to reset, continuing..."

          # Copy all downloaded/processed files from backup dir to working directory
          rm -rf downloads/ # Clean previous downloads to ensure only new ones are added
          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || echo "No files found in backup directory to copy."

          # Regenerate the README.md for the downloads folder
          regenerate_downloads_readme

          # Add README.md to the root of the repo
          git add README.md

          # Collect all files that need to be pushed (from downloads folder and root README)
          FILES_TO_PUSH=()
          while IFS= read -r -d '' file; do FILES_TO_PUSH+=("$file"); done < <(find downloads -print0 2>/dev/null)
          FILES_TO_PUSH+=("README.md") # Include the root README

          if [ ${#FILES_TO_PUSH[@]} -eq 0 ]; then
            echo "No files found to push."
            exit 0
          fi

          # Execute the batched push
          push_batch "${FILES_TO_PUSH[@]}"

          echo ""
          echo "=========================================="
          echo "Commit and Push process finished."
          echo "AVASAM (https://avasam.ir)"
          echo "=========================================="
