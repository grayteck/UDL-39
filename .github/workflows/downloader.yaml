name: Fast Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (space separated)"
        required: true
        type: string
      mode:
        description: "Mode"
        required: false
        default: normal
        type: choice
        options:
          - normal
          - zip
      password:
        description: "Zip password (optional)"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y aria2 zip

      - name: Prepare folders
        run: |
          mkdir -p downloads

      - name: Download files
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          PASS="${{ github.event.inputs.password }}"

          SPLIT_SIZE=$((95*1024*1024))

          for url in $URLS; do

            name=$(basename "${url%%\?*}")

            if [ -z "$name" ]; then
              name="file_$(date +%s)"
            fi

            echo "Downloading $name"

            aria2c \
              -x 16 \
              -s 16 \
              -k 1M \
              --file-allocation=none \
              -d downloads \
              -o "$name" \
              "$url"

          done

          if [ "$MODE" = "zip" ]; then

            cd downloads

            if [ -n "$PASS" ]; then
              zip -r -P "$PASS" archive.zip *
            else
              zip -r archive.zip *
            fi

            rm -f $(ls | grep -v archive.zip)

            cd ..
          fi

      - name: Split large files
        run: |
          cd downloads

          for f in *; do
            [ -f "$f" ] || continue

            size=$(stat -c%s "$f")

            if [ "$size" -gt $((95*1024*1024)) ]; then
              echo "Splitting $f"
              split -b 95M "$f" "$f.part."
              rm "$f"
            fi

          done

      - name: Generate README
        run: |
          echo "# Downloaded Files" > downloads/README.md
          echo "" >> downloads/README.md

          for f in downloads/*; do
            name=$(basename "$f")
            echo "- $name" >> downloads/README.md
          done

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add downloads

          git commit -m "Add downloaded files" || echo "No changes"

          git push
