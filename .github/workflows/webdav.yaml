name: WebDisk Upload Workflow

on:
  workflow_dispatch:
    inputs:
      webdav_user:
        description: 'WebDAV Username'
        required: true
        type: string
      webdav_pass:
        description: 'WebDAV Password'
        required: true
        type: string
      download_url:
        description: 'Direct download URL for the file'
        required: true
        type: string
      filename:
        description: 'Filename to be used for download and upload'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl aria2 dnsutils

      - name: Display inputs
        run: |
          echo "WebDAV User: ${{ github.event.inputs.webdav_user }}"
          echo "Download URL: ${{ github.event.inputs.download_url }}"
          echo "Filename: ${{ github.event.inputs.filename }}"
          echo "WebDisk URL: https://carseh.com:2078/DavWWWRoot/"

      - name: Test WebDisk DNS
        run: host carseh.com

      - name: Test WebDisk Connection and Login
        id: webdisk_test
        run: |
          WEBDISK_URL="https://carseh.com:2078/DavWWWRoot/"
          echo "Testing WebDisk connection to $WEBDISK_URL..."
          # Use -k for potential schannel-like issues, --silent, --show-error for clean output, --write-out to get HTTP code
          STATUS=$(curl -k --silent --show-error --output /dev/null \
            --write-out "%{http_code}" \
            -u "${{ github.event.inputs.webdav_user }}:${{ github.event.inputs.webdav_pass }}" \
            "$WEBDISK_URL")

          echo "HTTP Status from WebDisk test: $STATUS"

          # Expected successful status codes for WebDAV PROPFIND or similar
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "207" ]; then
            echo "WebDisk connection successful (Status: $STATUS)."
            echo "webdisk_ok=true" >> $GITHUB_ENV
          else
            echo "WebDisk connection failed (Status: $STATUS). Please check credentials or WebDisk URL."
            echo "webdisk_ok=false" >> $GITHUB_ENV
            exit 1 # Fail the job if WebDisk is not accessible
          fi
        shell: bash

      - name: Download file if WebDisk is OK
        if: env.webdisk_ok == 'true'
        run: |
          DOWNLOAD_URL="${{ github.event.inputs.download_url }}"
          FILENAME="${{ github.event.inputs.filename }}"
          echo "Downloading file from $DOWNLOAD_URL to ./downloaded/$FILENAME..."
          mkdir -p downloaded
          aria2c --file-allocation=none -o "downloaded/$FILENAME" "$DOWNLOAD_URL"
          echo "File downloaded successfully."

      - name: List downloaded files
        if: env.webdisk_ok == 'true'
        run: |
          echo "Listing downloaded files:"
          ls -lh downloaded/

      - name: Upload file to WebDisk
        if: env.webdisk_ok == 'true'
        run: |
          WEBDISK_URL="https://carseh.com:2078/DavWWWRoot/"
          FILENAME="${{ github.event.inputs.filename }}"
          echo "Uploading downloaded/$FILENAME to $WEBDISK_URL..."
          # Use -k to bypass certificate revocation check, --fail to exit on error, --show-error for logs
          curl -k --fail --show-error \
            -T "downloaded/$FILENAME" \
            -u "${{ github.event.inputs.webdav_user }}:${{ github.event.inputs.webdav_pass }}" \
            "${WEBDISK_URL}${FILENAME}"

          echo "File uploaded successfully."

      - name: Final success message
        if: success() && env.webdisk_ok == 'true'
        run: echo "Workflow completed successfully! File ${{ github.event.inputs.filename }} uploaded to WebDisk."

      - name: WebDisk test failed message
        if: failure() && env.webdisk_ok == 'false'
        run: echo "Workflow failed because WebDisk connection test failed."
