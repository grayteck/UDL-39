name: WebDisk Pre-Check + Upload

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct file URL"
        required: true
        type: string

      filename:
        description: "Filename on WebDisk"
        required: true
        type: string

      webdav_url:
        description: "WebDisk URL (example: https://example.com:2078/)"
        required: true
        type: string

      webdav_user:
        description: "WebDisk Username"
        required: true
        type: string

      webdav_pass:
        description: "WebDisk Password"
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl aria2 dnsutils

      # ✅ 1️⃣ تست DNS
      - name: DNS Check
        run: |
          HOST=$(echo "${{ github.event.inputs.webdav_url }}" | awk -F/ '{print $3}')
          echo "Checking DNS for $HOST"
          host "$HOST"

      # ✅ 2️⃣ تست اتصال و لاگین WebDisk
      - name: WebDisk Connection Test
        run: |
          echo "Testing WebDAV login..."

          STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            -u "${{ github.event.inputs.webdav_user }}:${{ github.event.inputs.webdav_pass }}" \
            "${{ github.event.inputs.webdav_url }}")

          echo "HTTP Status: $STATUS"

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "207" ]; then
            echo "❌ WebDisk connection failed!"
            exit 1
          else
            echo "✅ WebDisk connection successful!"
          fi

      # ✅ 3️⃣ دانلود فقط اگر WebDisk اوکی بود
      - name: Prepare folder
        run: mkdir -p files

      - name: Download file
        run: |
          aria2c \
            -x 16 \
            -s 16 \
            -k 1M \
            --file-allocation=none \
            --dir=files \
            --out="${{ github.event.inputs.filename }}" \
            "${{ github.event.inputs.url }}"

      # ✅ 4️⃣ آپلود
      - name: Upload to WebDisk
        run: |
          FILE="files/${{ github.event.inputs.filename }}"
          TARGET="${{ github.event.inputs.webdav_url }}${{ github.event.inputs.filename }}"

          echo "Uploading to $TARGET"

          curl --fail --show-error \
            -T "$FILE" \
            -u "${{ github.event.inputs.webdav_user }}:${{ github.event.inputs.webdav_pass }}" \
            "$TARGET"

      - name: Done
        run: echo "✅ Upload finished successfully"
