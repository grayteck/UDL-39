name: Fast Arvan Transfer

on:
  workflow_dispatch:
    inputs:
      urls: { required: true, type: string }
      arvan_access_key: { required: true, type: string }
      arvan_secret_key: { required: true, type: string }
      arvan_bucket: { required: true, type: string }
      arvan_endpoint: { required: true, type: string }

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          EOF

      - name: Download and Upload
        run: |
          mkdir -p downloads
          IFS=' ' read -r -a URL_ARRAY <<< "${{ github.event.inputs.urls }}"

          for URL in "${URL_ARRAY[@]}"; do
            if [ -n "$URL" ]; then
              FILENAME=$(basename "${URL%%\?}")
              echo "Processing $FILENAME..."
              # دانلود سریع با curl ساده
              curl -L "$URL" -o "downloads/$FILENAME"
              # آپلود سریع
              rclone copy "downloads/$FILENAME" arvan:${{ github.event.inputs.arvan_bucket }}/files/
            fi
          done
