name: Download Files

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (separate with space)"
        required: true
        type: string
      mode:
        description: "Download mode"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - zip
      password:
        description: "Zip password (optional)"
        required: false
        default: ""
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Download files
        run: |
          URLS="${{ github.event.inputs.urls }}"
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"

          mkdir -p downloads
          mkdir -p tmp

          for URL in $URLS; do
            FILE=$(basename "$URL")
            echo "Downloading $FILE"

            aria2c \
              -x 8 \
              -s 8 \
              --min-split-size=1M \
              --dir=tmp \
              --out="$FILE" \
              "$URL"
          done

          if [ "$MODE" = "zip" ]; then
            if [ -n "$PASSWORD" ]; then
              zip -r -P "$PASSWORD" downloads/files.zip tmp/*
            else
              zip -r downloads/files.zip tmp/*
            fi
          else
            mv tmp/* downloads/
          fi

          rm -rf tmp

      - name: Commit downloaded files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add downloads

          if ! git diff --cached --quiet; then
            git commit -m "Add downloaded files"
            git push
          else
            echo "No changes to commit"
          fi
