:::writing

name: 01- 🔥 دانلود فایل

on:

workflow_dispatch:

inputs:

urls:

description: ‘🔗 لینک های دانلود (با فاصله جدا کنید)’

required: true

type: string

mode:

description: ‘📦 حالت دانلود’

required: false

default: ‘normal’

type: choice

options:

normal
zip
password:

description: ‘🔒 رمز عبور برای فایل زیپ (اختیاری)’

required: false

default: ‘’

type: string

jobs:

save-file:

name: “📥 دانلود فایل”

runs-on: ubuntu-latest

timeout-minutes: 120

permissions:

contents: write

steps:

name: Checkout
uses: actions/checkout@v4

with:

token: ${{ secrets.GITHUB_TOKEN }}

fetch-depth: 0

name: Install aria2 and zip
run: |

sudo apt-get update

sudo apt-get install -y aria2 zip curl

name: Check URL provided
run: |

if [ -z “${{ github.event.inputs.urls }}” ]; then

echo “❌ لینک دانلود وارد نشده است!”

exit 1

fi

name: Download files
run: |

MODE=“${{ github.event.inputs.mode }}”

URLS=“${{ github.event.inputs.urls }}”

ZIP_PASSWORD=“${{ github.event.inputs.password }}”

mkdir -p downloads tmp

for URL in $URLS; do

FILE=
(
𝑏
𝑎
𝑠
𝑒
𝑛
𝑎
𝑚
𝑒
"
(basename"
URL")

echo “Downloading $FILE”

aria2c \

–split=4 \

–max-connection-per-server=4 \

–min-split-size=10M \

–dir=“tmp” \

–out=“$FILE” \

“$URL”

done

if [ “$MODE” = “zip” ]; then

if [ -n “$ZIP_PASSWORD” ]; then

zip -j -P “$ZIP_PASSWORD” downloads/archive.zip tmp/*

else

zip -j downloads/archive.zip tmp/*

fi

rm -rf tmp

else

mv tmp/* downloads/

rm -rf tmp

fi

name: Commit files
run: |

git config user.name “github-actions”

git config user.email “github-actions@github.com”

git add downloads

if ! git diff --cached --quiet; then

git commit -m “Add downloaded files”

git push

else

echo “Nothing to commit”

fi

:::
