name: Arvan Reliable Uploader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "لینک‌های دانلود (با فاصله جدا کنید)"
        required: true
        type: string
      arvan_access_key:
        description: "Arvan Access Key"
        required: true
      arvan_secret_key:
        description: "Arvan Secret Key"
        required: true
      arvan_bucket:
        description: "Arvan Bucket Name"
        required: true
      arvan_endpoint:
        description: "Arvan Endpoint"
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone curl

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          force_path_style = true
          EOF

      - name: Process Files
        shell: bash
        env:
          URLS: ${{ github.event.inputs.urls }}
        run: |
          set -e # توقف بلافاصله در صورت خطا
          set -x # نمایش تمام دستورات در حال اجرا برای دیباگ
          
          mkdir -p downloads
          
          # جدا سازی لینک ها بر اساس فاصله
          for URL in $URLS; do
            if [[ -n "$URL" ]]; then
              # برای امنیت، اگر لینک شامل کاراکترهای خاص بود مشکل ایجاد نشود
              FILENAME=$(echo "$URL" | awk -F'/' '{print $NF}' | cut -d'?' -f1)
              
              if [[ -z "$FILENAME" ]]; then FILENAME="file_$(date +%s)"; fi
              
              echo "Downloading $FILENAME ..."
              curl -L -o "downloads/$FILENAME" "$URL" --retry 3
              
              echo "Uploading $FILENAME to Arvan ..."
              rclone copy "downloads/$FILENAME" arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
                --s3-chunk-size=64M \
                --s3-upload-concurrency=4 \
                -P
              
              echo "Deleting $FILENAME from runner ..."
              rm "downloads/$FILENAME"
            fi
          done
