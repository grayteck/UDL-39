name: Arvan Fast Transfer

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (space separated)"
        required: true
      arvan_access_key:
        required: true
      arvan_secret_key:
        required: true
      arvan_bucket:
        required: true
      arvan_endpoint:
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y aria2 rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          EOF

      - name: Download and Upload
        run: |

          IFS=' ' read -r -a URLS <<< "${{ github.event.inputs.urls }}"

          for URL in "${URLS[@]}"; do

            FILE=$(basename "${URL%%\?}")

            echo "Downloading $FILE"

            aria2c \
              -x16 \
              -s16 \
              -k1M \
              --file-allocation=none \
              --max-tries=10 \
              --retry-wait=5 \
              -o "$FILE" \
              "$URL"

            echo "Uploading $FILE to Arvan"

            rclone copy "$FILE" arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
              --s3-chunk-size 128M \
              --transfers 8 \
              --checkers 16 \
              --progress

            rm "$FILE"

          done
