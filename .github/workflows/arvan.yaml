name: Arvan Downloader Uploader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "لینک های دانلود (با فاصله جدا کنید)"
        required: true
        type: string

      arvan_access_key:
        description: "Arvan Access Key"
        required: true
        type: string

      arvan_secret_key:
        description: "Arvan Secret Key"
        required: true
        type: string

      arvan_bucket:
        description: "Arvan Bucket Name"
        required: true
        type: string

      arvan_endpoint:
        description: "Arvan Endpoint (مثال: https://s3.ir-thr-at1.arvanstorage.ir)"
        required: true
        type: string

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y aria2 curl rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          no_check_bucket = true
          EOF

      - name: Download files
        run: |
          mkdir downloads
          URLS="${{ github.event.inputs.urls }}"

          for URL in $URLS; do
            FILE=$(basename "${URL%%\?*}")
            echo "Downloading $FILE"
            aria2c -x 16 -s 16 -k 1M --dir downloads --out "$FILE" "$URL"
          done

      - name: Upload to Arvan
        run: |
          rclone copy downloads/ arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
            --progress \
            --transfers 4 \
            --s3-chunk-size 64M \
            --s3-upload-concurrency 4

      - name: Done
        run: |
          echo "Upload finished"
