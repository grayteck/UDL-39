name: Arvan Downloader Uploader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "لینک های دانلود (با فاصله جدا کنید)"
        required: true
        type: string
      arvan_access_key:
        description: "Arvan Access Key"
        required: true
        type: string
      arvan_secret_key:
        description: "Arvan Secret Key"
        required: true
        type: string
      arvan_bucket:
        description: "Arvan Bucket Name"
        required: true
        type: string
      arvan_endpoint:
        description: "Arvan Endpoint"
        required: true
        type: string

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y aria2 curl rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          acl = private
          EOF

      - name: Download files
        run: |
          mkdir -p downloads
          # تبدیل رشته ورودی به آرایه با جداکننده فاصله
          IFS=' ' read -r -a URL_ARRAY <<< "${{ github.event.inputs.urls }}"
          
          for URL in "${URL_ARRAY[@]}"; do
            if [ -n "$URL" ]; then
              echo "Downloading: $URL"
              # استفاده از --content-disposition برای استخراج نام واقعی فایل
              aria2c -x 16 -s 16 -k 1M --dir=downloads --content-disposition "$URL"
            fi
          done

      - name: Upload to Arvan
        run: |
          # اطمینان از وجود پوشه و فایل قبل از آپلود
          rclone copy downloads/ arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
            --progress \
            --transfers 4 \
            --s3-chunk-size 64M \
            --s3-upload-concurrency 4

      - name: Done
        if: always()
        run: echo "Process finished"
