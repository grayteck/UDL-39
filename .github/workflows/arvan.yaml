name: Arvan High Volume Transfer (20GB+)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "لینک های دانلود (با فاصله جدا کنید)"
        required: true
        type: string
      arvan_access_key:
        description: "Arvan Access Key"
        required: true
        type: string
      arvan_secret_key:
        description: "Arvan Secret Key"
        required: true
        type: string
      arvan_bucket:
        description: "Arvan Bucket Name"
        required: true
        type: string
      arvan_endpoint:
        description: "Arvan Endpoint"
        required: true
        type: string

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Rclone
        run: sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [arvan]
          type = s3
          provider = Other
          access_key_id = ${{ github.event.inputs.arvan_access_key }}
          secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
          endpoint = ${{ github.event.inputs.arvan_endpoint }}
          EOF

      - name: Stream Download and Upload
        run: |
          IFS=' ' read -r -a URL_ARRAY <<< "${{ github.event.inputs.urls }}"

          for URL in "${URL_ARRAY[@]}"; do
            if [ -n "$URL" ]; then
              # استخراج نام فایل از URL یا استفاده از نام تصادفی در صورت عدم وجود
              FILENAME=$(basename "${URL%%\?}")
              echo "Streaming $FILENAME to Arvan..."

              # استفاده از rcat برای آپلود مستقیم بدون ذخیره در دیسک
              curl -sL "$URL" | rclone rcat arvan:${{ github.event.inputs.arvan_bucket }}/files/"$FILENAME" --s3-chunk-size 64M

              echo "Finished $FILENAME"
            fi
          done

      - name: Done
        run: echo "Transfer Completed Successfully"
