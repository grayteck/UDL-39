name: Fast Parallel Downloader

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (separate with space)"
        required: true
        type: string
      mode:
        description: "Download mode"
        required: false
        default: "normal"
        type: choice
        options:
          - normal
          - zip
      password:
        description: "Zip password (optional)"
        required: false
        default: ""
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        worker: [1,2,3,4]   # 4 parallel workers

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip p7zip-full

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p tmp

      - name: Split URLs between workers
        run: |
          echo "${{ github.event.inputs.urls }}" | tr ' ' '\n' > all_urls.txt
          split -n l/4 all_urls.txt urls_
          mv urls_0$(( ${{ matrix.worker }} - 1 )) urls_worker.txt || true

      - name: Download files
        run: |
          if [ ! -f urls_worker.txt ]; then
            echo "No URLs for this worker"
            exit 0
          fi

          while read URL; do
            FILE=$(basename "$URL" | cut -d'?' -f1)

            echo "Downloading $FILE"

            aria2c \
              -x 16 \
              -s 16 \
              -k 1M \
              --file-allocation=none \
              --dir=tmp \
              --out="$FILE" \
              "$URL"

          done < urls_worker.txt

      - name: Zip mode
        if: matrix.worker == 1
        run: |
          MODE="${{ github.event.inputs.mode }}"
          PASSWORD="${{ github.event.inputs.password }}"

          if [ "$MODE" = "zip" ]; then

            if [ -n "$PASSWORD" ]; then
              zip -r -P "$PASSWORD" downloads/archive.zip tmp/*
            else
              zip -r downloads/archive.zip tmp/*
            fi

            rm -rf tmp
          else
            mv tmp/* downloads/ || true
            rm -rf tmp
          fi

      - name: Split large files
        if: matrix.worker == 1
        run: |
          cd downloads || exit 0

          for f in *; do
            size=$(stat -c%s "$f")

            if [ $size -gt 95000000 ]; then
              echo "Splitting $f"
              split -b 95M "$f" "$f.part."
              rm "$f"
            fi
          done

      - name: Commit files
        if: matrix.worker == 1
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add -f downloads

          if ! git diff --cached --quiet; then
            git commit -m "Downloaded files"
            git push
          else
            echo "No changes"
          fi

      - name: Show download links
        if: matrix.worker == 1
        run: |
          echo "Download links:"
          REPO="${{ github.repository }}"

          for f in downloads/*; do
            name=$(basename "$f")
            echo "https://raw.githubusercontent.com/$REPO/main/downloads/$name"
          done
