name: Arvan Chunk Stream Transfer

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (space separated)"
        required: true
      arvan_access_key:
        required: true
      arvan_secret_key:
        required: true
      arvan_bucket:
        required: true
      arvan_endpoint:
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash

    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone
        cat <<EOF > ~/.config/rclone/rclone.conf
        [arvan]
        type = s3
        provider = Other
        access_key_id = ${{ github.event.inputs.arvan_access_key }}
        secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
        endpoint = ${{ github.event.inputs.arvan_endpoint }}
        EOF

    - name: Transfer
      run: |

        URLS=(${{ github.event.inputs.urls }})

        for URL in "${URLS[@]}"; do

          FILE=$(basename "${URL%%\?}")
          echo "Downloading $FILE"

          curl -L --retry 5 "$URL" | split -b 1024M -d - "${FILE}.part"

          for PART in ${FILE}.part*; do

            echo "Uploading $PART"

            rclone copy "$PART" arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
              --s3-chunk-size 128M \
              --s3-upload-concurrency 4 \
              --retries 10 \
              --low-level-retries 20 \
              --progress

            rm "$PART"

          done

        done
