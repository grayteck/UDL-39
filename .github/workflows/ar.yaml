name: Arvan Optimized Transfer (Up to 15GB)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Download URLs (space separated)"
        required: true
      arvan_access_key:
        required: true
      arvan_secret_key:
        required: true
      arvan_bucket:
        required: true
      arvan_endpoint:
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android

    - name: Install rclone
      run: |
        curl https://rclone.org/install.sh | sudo bash

    - name: Configure rclone
      run: |
        mkdir -p ~/.config/rclone

        cat <<EOF > ~/.config/rclone/rclone.conf
        [arvan]
        type = s3
        provider = Other
        access_key_id = ${{ github.event.inputs.arvan_access_key }}
        secret_access_key = ${{ github.event.inputs.arvan_secret_key }}
        endpoint = ${{ github.event.inputs.arvan_endpoint }}
        acl = private
        EOF

    - name: Transfer files (Stable Mode)
      run: |
        set -ex

        URLS="${{ github.event.inputs.urls }}"

        for URL in $URLS; do

          SAFE_NAME="file_$(date +%s)_$RANDOM"
          echo "Processing $SAFE_NAME"

          echo "Downloading and splitting..."

          curl -L --retry 5 --retry-delay 5 "$URL" \
            | split -b 1024M -d - "${SAFE_NAME}.part"

          echo "Uploading parts..."

          for PART in ${SAFE_NAME}.part*; do

            echo "Uploading $PART"

            rclone copy "$PART" arvan:${{ github.event.inputs.arvan_bucket }}/files/ \
              --s3-chunk-size 2G \
              --s3-upload-concurrency 1 \
              --retries 5 \
              --progress

            rm "$PART"

          done

          echo "Completed $SAFE_NAME"

        done
